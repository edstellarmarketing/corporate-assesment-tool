<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edstellar — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500;600&family=Inter+Tight:wght@400;450;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0e1a2b;
    --ink-soft: #2a3a52;
    --ink-mute: #5a6a82;
    --ink-faint: #95a0b3;
    --paper: #fbfaf7;
    --paper-warm: #f5f2ea;
    --rule: #e6e1d3;
    --rule-soft: #efece1;
    --edstellar: #1d4ed8;
    --edstellar-deep: #0a2472;
    --edstellar-mist: #e8eeff;
    --accent: #c8410b;
    --accent-soft: #fdeee0;
    --ok: #1f6f43;
    --ok-soft: #e3f1e7;
    --warn: #8a5a00;
    --warn-soft: #fdf3d8;
    --bad: #a8290c;
    --bad-soft: #fbe5df;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter Tight', system-ui, sans-serif;
    font-feature-settings: 'ss01', 'cv11';
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }
  body {
    background-image: radial-gradient(circle at 1px 1px, rgba(14, 26, 43, 0.04) 1px, transparent 0);
    background-size: 28px 28px;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .serif { font-family: 'Fraunces', Georgia, serif; font-optical-sizing: auto; letter-spacing: -0.01em; }
  .mono { font-family: 'JetBrains Mono', monospace; }

  /* ============ LOGIN CONTAINER ============ */
  .login-wrapper {
    width: 100%;
    max-width: 420px;
    padding: 0 20px;
  }

  .login-card {
    background: var(--paper);
    border: 1px solid var(--rule);
    padding: 40px 36px 36px;
  }

  /* ============ BRAND ============ */
  .login-brand {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 36px;
  }
  .login-logo-wrap {
    background: var(--ink);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    border-radius: 2px;
  }
  .login-logo-text {
    color: var(--paper);
    font-family: 'Inter Tight', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .login-heading {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 500;
    color: var(--ink);
    text-align: center;
    margin-bottom: 4px;
    letter-spacing: -0.01em;
  }
  .login-sub {
    font-size: 12.5px;
    color: var(--ink-mute);
    text-align: center;
    margin-bottom: 28px;
  }

  /* ============ FORM ============ */
  .form-group {
    margin-bottom: 18px;
  }
  .form-label {
    display: block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-mute);
    font-weight: 600;
    margin-bottom: 6px;
  }
  .form-input {
    width: 100%;
    padding: 10px 14px;
    font-family: inherit;
    font-size: 13px;
    color: var(--ink);
    border: 1px solid var(--rule);
    background: var(--paper-warm);
    outline: none;
    transition: border-color 0.15s;
  }
  .form-input:focus {
    border-color: var(--ink-faint);
    background: var(--paper);
  }
  .form-input::placeholder {
    color: var(--ink-faint);
  }

  .form-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .form-check {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--ink-mute);
    cursor: pointer;
  }
  .form-check input[type="checkbox"] {
    width: 15px;
    height: 15px;
    accent-color: var(--ink);
    cursor: pointer;
  }
  .form-link {
    font-size: 12px;
    color: var(--ink-mute);
    text-decoration: none;
    font-weight: 500;
    transition: color 0.15s;
  }
  .form-link:hover {
    color: var(--accent);
  }

  /* ============ BUTTON ============ */
  .btn {
    padding: 11px 20px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    border: 1px solid var(--ink);
    background: var(--paper);
    color: var(--ink);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    transition: all 0.15s;
  }
  .btn:hover { background: var(--ink); color: var(--paper); }
  .btn-primary {
    background: var(--ink);
    color: var(--paper);
    width: 100%;
  }
  .btn-primary:hover {
    background: var(--accent);
    border-color: var(--accent);
  }

  /* ============ ERROR ============ */
  .form-error {
    background: var(--bad-soft);
    border: 1px solid #e8c0b6;
    color: var(--bad);
    padding: 10px 14px;
    font-size: 12px;
    margin-bottom: 18px;
    display: none;
  }
  .form-error.visible { display: block; }

  /* ============ DIVIDER ============ */
  .login-divider {
    height: 1px;
    background: var(--rule);
    margin: 24px 0;
  }

  .login-footer {
    text-align: center;
    font-size: 11.5px;
    color: var(--ink-faint);
  }
  .login-footer a {
    color: var(--ink-mute);
    font-weight: 500;
    text-decoration: none;
  }
  .login-footer a:hover { color: var(--accent); }

  /* ============ CORNER MARK ============ */
  .corner-mark {
    position: fixed;
    bottom: 14px;
    right: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--ink-faint);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="login-wrapper">
  <div class="login-card">
    <!-- Brand -->
    <div class="login-brand">
      <div class="login-logo-wrap" style="background:var(--paper);">
        <img src="Edstellar_Primary_Logo-1.png" alt="Edstellar" style="height:28px;">
      </div>
    </div>

    <h1 class="login-heading serif">Sign in to your account</h1>
    <p class="login-sub">Assessment Platform</p>

    <!-- Error message (hidden by default) -->
    <div class="form-error" id="loginError">
      Invalid email or password. Please try again.
    </div>

    <!-- Form -->
    <form id="loginForm" onsubmit="return false;">
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input class="form-input" type="email" id="email" placeholder="you@company.com" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" placeholder="Enter your password" required>
      </div>

      <div class="form-row">
        <label class="form-check">
          <input type="checkbox" id="remember">
          Remember me
        </label>
        <a href="reset_password.html" class="form-link">Forgot password?</a>
      </div>

      <button type="submit" class="btn btn-primary">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
        Sign In
      </button>
    </form>

    <div class="login-divider"></div>

    <p class="login-footer">
      Need help? Contact your <a href="#">administrator</a>
    </p>
  </div>
</div>

<div class="corner-mark">Edstellar Platform · v3.2</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/api/env"></script>
<script src="supabase-client.js"></script>
<script>
(async function() {
  // If already logged in, redirect based on role
  const client = getClient();
  if (client) {
    const { data: { session } } = await client.auth.getSession();
    if (session) {
      const { data: profile } = await client
        .from('v2-users')
        .select('role')
        .eq('id', session.user.id)
        .single();
      if (profile?.role === 'admin' || !profile) {
        window.location.href = 'admin_dashboard.html';
        return;
      } else {
        window.location.href = 'employee_dashboard.html';
        return;
      }
    }
  }

  // Login form submit
  const form = document.getElementById('loginForm');
  const errorEl = document.getElementById('loginError');
  const submitBtn = form.querySelector('button[type="submit"]');
  const originalBtnHTML = submitBtn.innerHTML;

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorEl.classList.remove('visible');

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
      errorEl.textContent = 'Please enter both email and password.';
      errorEl.classList.add('visible');
      return;
    }

    // Disable button and show loading
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin 1s linear infinite;"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg> Signing in...';

    try {
      const sb = getClient();
      const { data, error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        errorEl.textContent = error.message || 'Invalid email or password. Please try again.';
        errorEl.classList.add('visible');
        submitBtn.disabled = false;
        submitBtn.innerHTML = originalBtnHTML;
        return;
      }

      // Query user role for redirect
      const { data: profile, error: profileErr } = await sb
        .from('v2-users')
        .select('role')
        .eq('id', data.user.id)
        .single();

      if (profileErr || !profile) {
        // No profile yet — redirect to dashboard anyway so seed can be run
        // Default to admin dashboard for first-time setup
        console.warn('No user profile found in v2-users. Redirecting to dashboard for initial setup.');
        window.location.href = 'admin_dashboard.html';
        return;
      }

      // Role-based redirect
      if (profile.role === 'admin') {
        window.location.href = 'admin_dashboard.html';
      } else {
        window.location.href = 'employee_dashboard.html';
      }

    } catch (err) {
      errorEl.textContent = 'Connection error. Check your network and Supabase configuration.';
      errorEl.classList.add('visible');
      submitBtn.disabled = false;
      submitBtn.innerHTML = originalBtnHTML;
    }
  });
})();
</script>
<style>@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}</style>

</body>
</html>
